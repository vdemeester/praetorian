version: 2

project_name: praetorian

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: praetorian
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/vdemeester/praetorian/version.Version={{ .Version }}
      - -X github.com/vdemeester/praetorian/version.Commit={{ .ShortCommit }}
      - -X github.com/vdemeester/praetorian/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - examples/**/*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  prerelease: auto
